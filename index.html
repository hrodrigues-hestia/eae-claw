<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eae Claw 🦀</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <span class="logo">🦀</span>
        <span class="title">Eae Claw</span>
      </div>
      <div class="header-right">
        <span id="unread-badge" class="unread-badge hidden">0</span>
        <span id="status-dot" class="status-dot offline"></span>
        <span id="status-text" class="status-text">Offline</span>
        <button id="btn-mini" title="Mini mode (Ctrl+M)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M19 13H5v-2h14v2z"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="chat-container">
      <div id="messages"></div>
    </main>

    <footer id="input-area">
      <div class="input-row">
        <button id="btn-attach" title="Anexar arquivo">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
          </svg>
        </button>
        <input type="file" id="file-input" multiple style="display:none" />
        <input
          type="text"
          id="text-input"
          placeholder="Digite uma mensagem..."
          autocomplete="off"
        />
        <button id="btn-send" title="Enviar (Enter)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <button id="btn-mic" title="Gravar áudio (Ctrl+Shift+C)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
      </div>
      <div id="recording-indicator" class="hidden">
        <span class="rec-dot"></span>
        <span id="rec-time">0:00</span>
        <span class="rec-label">Gravando...</span>
        <button id="btn-cancel-rec" title="Cancelar">✕</button>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
